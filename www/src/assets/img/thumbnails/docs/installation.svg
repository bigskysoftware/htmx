<svg viewBox="0 0 128 96" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .accent { fill: var(--accent); stroke: var(--accent); transition: fill 150ms, stroke 150ms; }
        .accent-body { fill: var(--accent); fill-opacity: 0.4; stroke: var(--accent); transition: fill 150ms, stroke
        150ms; }
    </style>

    <!-- Window -->
    <rect x="24" y="44" width="80" height="40" rx="4" stroke="currentColor" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="32" cy="52" r="1.5" fill="currentColor" fill-opacity="0.3"/>
    <circle cx="37" cy="52" r="1.5" fill="currentColor" fill-opacity="0.3"/>
    <circle cx="42" cy="52" r="1.5" fill="currentColor" fill-opacity="0.3"/>

    <!-- Package -->
    <path class="accent-body" d="M57 20l7-4 7 4v8l-7 4-7-4z" stroke-width="1.5" stroke-linejoin="round"/>
    <path class="accent" d="M57 20l7 4 7-4M64 24v8" style="fill: none" stroke-width="1" stroke-linejoin="round"/>

