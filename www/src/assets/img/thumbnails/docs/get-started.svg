<svg viewBox="0 0 128 128" overflow="visible" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        /* 3D shading via CSS variables — uses Tailwind theme tokens */
        .crt {
            --f1: var(--color-neutral-150); --f2: var(--color-neutral-200);
            --f3: var(--color-neutral-300); --f4: var(--color-neutral-350);
            --scr: var(--color-neutral-800); --scr-s: var(--color-neutral-400);
            transform-origin: center;
        }
        @media (prefers-color-scheme: dark) {
            .crt {
                --f1: var(--color-neutral-650); --f2: var(--color-neutral-700);
                --f3: var(--color-neutral-750); --f4: var(--color-neutral-800);
                --scr: var(--color-neutral-950); --scr-s: var(--color-neutral-900);

            }
        }
        .group:has(a:hover, a:focus-visible, a:active) .crt {
            --f1: var(--color-neutral-100); --f2: var(--color-neutral-200);
            --f3: var(--color-neutral-300); --f4: var(--color-neutral-400);

            animation: crt-rage 0.08s ease-in-out infinite alternate;
        }
        @media (prefers-color-scheme: dark) {
            .group:has(a:hover, a:focus-visible, a:active) .crt {
                --f1: var(--color-neutral-300); --f2: var(--color-neutral-400);
                --f3: var(--color-neutral-600); --f4: var(--color-neutral-700);

            }
        }
        .crt-detail { opacity: 0; transition: opacity 0.2s ease; }
        .group:has(a:hover, a:focus-visible, a:active) .crt-detail { opacity: 1; }

        /* Polygon shading classes — scoped under .crt */
        .crt .gs { transition: fill 150ms, stroke 150ms; stroke-width: 0.5; stroke-linejoin: round; }
        .crt .gs1 { fill: var(--f1); stroke: var(--f1); }
        .crt .gs2 { fill: var(--f2); stroke: var(--f2); }
        .crt .gs3 { fill: var(--f3); stroke: var(--f3); }
        .crt .gs4 { fill: var(--f4); stroke: var(--f4); }
        .crt .gs-scr { fill: var(--scr); stroke: var(--scr-s); opacity: 0.3; transition: fill 150ms, stroke 150ms, opacity 150ms; }
        .group:has(a:hover, a:focus-visible, a:active) .crt .gs-scr { opacity: 1; }
        .horse { opacity: 0; transition: opacity 0.2s ease; }
        .group:has(a:hover, a:focus-visible, a:active) .horse { opacity: 1; }
        .play { fill: white; opacity: 0.4; transition: opacity 0.2s ease; }
        .group:has(a:hover, a:focus-visible, a:active) .play { opacity: 0; }
        .glare { opacity: 0; transition: opacity 0.2s ease; }
        .group:has(a:hover, a:focus-visible, a:active) .glare { opacity: 0.12; }

        /* Rage shake */
        @keyframes crt-rage {
            to { transform: translate(-1.5px, 1.5px) rotate(1.5deg) scale(1.02); }
        }

        /* Laser */
        .laser { stroke-linecap: round; stroke-dasharray: 600; stroke-dashoffset: 600; opacity: 0;
                 transition: stroke-dashoffset 0.2s ease-out, opacity 0.2s ease; }
        .group:has(a:hover, a:focus-visible, a:active) .laser { stroke-dashoffset: 0; opacity: 1; }
        .group:has(a:hover, a:focus-visible, a:active) .laser-g {
            animation: crt-pulse 0.1s infinite alternate 0.2s;
        }
        @keyframes crt-pulse { from { stroke-width: 5; opacity: 0.8; } to { stroke-width: 9; } }

        /* Rain */
        .rain { opacity: 0; fill: var(--color-blue-400); }
        .group:has(a:hover, a:focus-visible, a:active) .rain { animation: crt-rain 2.5s linear infinite; }
        @keyframes crt-rain {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 0.5; } 80% { opacity: 0.5; }
            100% { transform: translateY(140px); opacity: 0; }
        }
    </style>

    <defs><clipPath id="scr-clip"><rect x="36" y="32" width="56" height="40"/></clipPath></defs>

    <!-- Lore rain (spread across full card width) -->
    <text class="rain" x="-50" y="-10" font-family="monospace" font-weight="bold" font-size="7" style="animation-delay:0.1s;animation-duration:1.8s">&lt;/&gt;</text>
    <text class="rain" x="-20" y="-10" font-family="monospace" font-weight="bold" font-size="6" style="animation-delay:1.8s;animation-duration:2.0s">CEO</text>
    <text class="rain" x="10" y="-10" font-family="monospace" font-weight="bold" font-size="7" style="animation-delay:0.6s;animation-duration:1.9s">&lt;/&gt;</text>
    <text class="rain" x="35" y="-10" font-family="monospace" font-weight="bold" font-size="5" style="animation-delay:1.3s;animation-duration:1.5s">XSS</text>
    <text class="rain" x="56" y="-10" font-family="monospace" font-weight="bold" font-size="6" style="animation-delay:0.4s;animation-duration:2.5s">grug</text>
    <text class="rain" x="80" y="-10" font-family="monospace" font-weight="bold" font-size="8" style="animation-delay:1.0s;animation-duration:1.9s">&lt;/&gt;</text>
    <text class="rain" x="105" y="-10" font-family="monospace" font-weight="bold" font-size="7" style="animation-delay:0.3s;animation-duration:2.1s">HTMX</text>
    <text class="rain" x="135" y="-10" font-family="monospace" font-weight="bold" font-size="5" style="animation-delay:0.9s;animation-duration:1.7s">REST</text>
    <text class="rain" x="160" y="-10" font-family="monospace" font-weight="bold" font-size="6" style="animation-delay:1.5s;animation-duration:2.2s">&lt;/&gt;</text>
    <text class="rain" x="180" y="-10" font-family="monospace" font-weight="bold" font-size="7" style="animation-delay:0.7s;animation-duration:1.6s">JSON</text>

    <g class="crt">
        <!-- Outer chassis bevels -->
        <polygon points="24,20 104,20 96,28 32,28" class="gs gs1"/>
        <polygon points="32,76 96,76 104,84 24,84" class="gs gs3"/>
        <polygon points="24,20 32,28 32,76 24,84" class="gs gs2"/>
        <polygon points="104,20 96,28 96,76 104,84" class="gs gs4"/>

        <!-- Screen bezel inset -->
        <polygon points="32,28 96,28 92,32 36,32" class="gs gs4 crt-detail"/>
        <polygon points="36,72 92,72 96,76 32,76" class="gs gs1 crt-detail"/>
        <polygon points="32,28 36,32 36,72 32,76" class="gs gs4 crt-detail"/>
        <polygon points="96,28 92,32 92,72 96,76" class="gs gs2 crt-detail"/>

        <!-- CRT screen -->
        <rect x="36" y="32" width="56" height="40" class="gs-scr"/>

        <!-- Horse face (clipped to screen, revealed on hover) -->
        <image class="horse" href="/img/horse-face.webp" x="36" y="30" width="56" height="56" clip-path="url(#scr-clip)" preserveAspectRatio="xMidYMin slice"/>

        <!-- Scanline filter over horse -->
        <rect x="36" y="32" width="56" height="40" class="horse" fill="var(--color-neutral-400)" opacity="0.3" style="mix-blend-mode: multiply"/>

        <!-- Play triangle (visible when not hovered) -->
        <polygon points="58,44 58,60 72,52" class="play"/>

        <!-- Screen glare (on top of horse) -->
        <polygon points="36,32 75,32 45,72 36,72" class="glare" fill="white"/>

        <!-- Stand -->
        <polygon points="56,84 72,84 76,98 52,98" class="gs gs4"/>

        <!-- Base -->
        <polygon points="40,98 88,98 96,104 32,104" class="gs gs1"/>
        <polygon points="32,104 96,104 96,108 32,108" class="gs gs3"/>
        <polygon points="40,98 32,104 32,108 40,102" class="gs gs4"/>
        <polygon points="88,98 96,104 96,108 88,102" class="gs gs4"/>

        <!-- Details: disk drive slot + vents -->
        <polygon points="65,78 88,78 88,80 65,80" class="gs gs4 crt-detail"/>
        <rect x="26" y="32" width="4" height="1" class="gs gs4 crt-detail"/>
        <rect x="26" y="36" width="4" height="1" class="gs gs4 crt-detail"/>
        <rect x="26" y="40" width="4" height="1" class="gs gs4 crt-detail"/>

        <!-- Laser beams from horse's eye -->
        <line x1="58" y1="49" x2="340" y2="280" class="laser laser-g" stroke="var(--color-red-500, #ef4444)" stroke-width="5"/>
        <line x1="58" y1="49" x2="340" y2="280" class="laser" stroke="white" stroke-width="2"/>
        <line x1="73" y1="47" x2="360" y2="240" class="laser laser-g" stroke="var(--color-red-500, #ef4444)" stroke-width="5"/>
        <line x1="73" y1="47" x2="360" y2="240" class="laser" stroke="white" stroke-width="2"/>
    </g>
</svg>
