<svg viewBox="0 0 128 128" overflow="visible" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .features-board {
        --v1: var(--color-neutral-150);
        --v2: var(--color-neutral-200);
        --v3: var(--color-neutral-300);
        --v4: var(--color-neutral-350);
        --accent: var(--color-neutral-350);
        }
        @media (prefers-color-scheme: dark) {
        .features-board {
        --v1: var(--color-neutral-450);
        --v2: var(--color-neutral-550);
        --v3: var(--color-neutral-600);
        --v4: var(--color-neutral-650);
        --accent: var(--color-neutral-650);
        }
        }
        .group:has(a:hover, a:focus-visible, a:active) .features-board {
        --v1: var(--color-neutral-150);
        --v2: var(--color-neutral-200);
        --v3: var(--color-neutral-350);
        --v4: var(--color-neutral-450);
        --accent: var(--color-blue-500);
        }
        @media (prefers-color-scheme: dark) {
        .group:has(a:hover, a:focus-visible, a:active) .features-board {
        --v1: var(--color-neutral-300);
        --v2: var(--color-neutral-400);
        --v3: var(--color-neutral-500);
        --v4: var(--color-neutral-600);
        --accent: var(--color-blue-400);
        }
        }

        .gs { transition: fill 150ms, stroke 150ms; stroke-width: 0.5; stroke-linejoin: round; }
        .gs1 { fill: var(--v1); stroke: var(--v1); }
        .gs2 { fill: var(--v2); stroke: var(--v2); }
        .gs3 { fill: var(--v3); stroke: var(--v3); }
        .gs4 { fill: var(--v4); stroke: var(--v4); }
        .gs-accent { fill: var(--accent); stroke: var(--accent); transition: fill 150ms, stroke 150ms; }

        .knob { transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .group:has(a:hover, a:focus-visible, a:active) .knob-1 { transform: translate(20px, -10px); transition-delay: 0ms; }
        .group:has(a:hover, a:focus-visible, a:active) .knob-2 { transform: translate(24px, -12px); transition-delay: 40ms; }
        .group:has(a:hover, a:focus-visible, a:active) .knob-3 { transform: translate(16px, -8px); transition-delay: 80ms; }
    </style>

    <g class="features-board">
        <!-- Board: top=gs2, left=gs3, right=gs4 (darker, it's the base) -->
        <polygon class="gs gs2" points="24,60 64,40 104,60 64,80" />
        <polygon class="gs gs3" points="24,60 64,80 64,96 24,76" />
        <polygon class="gs gs4" points="64,80 104,60 104,76 64,96" />

        <!-- Indicator diamonds -->
        <polygon class="gs-accent" points="84,52.5 81,54 84,55.5 87,54" />
        <polygon class="gs-accent" points="92,56.5 89,58 92,59.5 95,58" />

        <!-- Track lines (recessed grooves) -->
        <line class="gs gs4" x1="40" y1="65" x2="64" y2="53" style="stroke-width: 2.5;" />
        <line class="gs gs4" x1="52" y1="71" x2="76" y2="59" style="stroke-width: 2.5;" />
        <line class="gs gs4" x1="64" y1="77" x2="88" y2="65" style="stroke-width: 2.5;" />

        <!-- Knobs: top=gs1, left=gs2, right=gs3 (lighter, raised and catching light) -->
        <g class="knob knob-1">
            <polygon class="gs gs1" points="40,57 34,54 40,51 46,54" />
            <polygon class="gs gs2" points="40,65 34,62 34,54 40,57" />
            <polygon class="gs gs3" points="40,65 46,62 46,54 40,57" />
        </g>
        <g class="knob knob-2">
            <polygon class="gs gs1" points="52,63 46,60 52,57 58,60" />
            <polygon class="gs gs2" points="52,71 46,68 46,60 52,63" />
            <polygon class="gs gs3" points="52,71 58,68 58,60 52,63" />
        </g>
        <g class="knob knob-3">
            <polygon class="gs gs1" points="64,69 58,66 64,63 70,66" />
            <polygon class="gs gs2" points="64,77 58,74 58,66 64,69" />
            <polygon class="gs gs3" points="64,77 70,74 70,66 64,69" />
        </g>
    </g>
</svg>