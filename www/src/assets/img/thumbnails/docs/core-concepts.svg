<svg viewBox="0 0 128 128" overflow="visible" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        /* Design System Core Variables */
        .core-concept {
        --v1: var(--color-neutral-150);
        --v2: var(--color-neutral-200);
        --v3: var(--color-neutral-300);
        --v4: var(--color-neutral-350);
        --glow-line: var(--color-neutral-300);
        --text-glow: var(--color-neutral-400);
        }
        @media (prefers-color-scheme: dark) {
        .core-concept {
        --v1: var(--color-neutral-650);
        --v2: var(--color-neutral-700);
        --v3: var(--color-neutral-750);
        --v4: var(--color-neutral-800);
        --glow-line: var(--color-neutral-700);
        --text-glow: var(--color-neutral-600);
        }
        }

        /* Hover State Mechanics */
        .group:has(a:hover, a:focus-visible, a:active) .core-concept {
        --v1: var(--color-neutral-100);
        --v2: var(--color-neutral-200);
        --v3: var(--color-neutral-300);
        --v4: var(--color-neutral-400);
        --glow-line: var(--color-blue-500);
        --text-glow: var(--color-blue-600);
        }
        @media (prefers-color-scheme: dark) {
        .group:has(a:hover, a:focus-visible, a:active) .core-concept {
        --v1: var(--color-neutral-300);
        --v2: var(--color-neutral-400);
        --v3: var(--color-neutral-600);
        --v4: var(--color-neutral-700);
        --glow-line: var(--color-blue-400);
        --text-glow: var(--color-blue-300);
        }
        }

        /* Shape Styling Convention — scoped to avoid collision with get-started.svg */
        .core-concept .gs {
        transition: fill 150ms, stroke 150ms;
        stroke-width: 0.5;
        stroke-linejoin: round;
        }
        .core-concept .gs1 { fill: var(--v1); stroke: var(--v1); }
        .core-concept .gs2 { fill: var(--v2); stroke: var(--v2); }
        .core-concept .gs3 { fill: var(--v3); stroke: var(--v3); }
        .core-concept .gs4 { fill: var(--v4); stroke: var(--v4); }

        /* Metaphor Specific Animation Classes */

        /* 1. The Outer Shells (Exploded View Animation) */
        .shield {
        transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .group:has(a:hover, a:focus-visible, a:active) .top-shield {
        transform: translate(0px, -32px);
        }
        .group:has(a:hover, a:focus-visible, a:active) .left-shield {
        transform: translate(-30px, 17px);
        }
        .group:has(a:hover, a:focus-visible, a:active) .right-shield {
        transform: translate(30px, 17px);
        }

        /* 2. The Hidden Core Crystal Reveal */
        .core-layer {
        opacity: 0;
        transform: scale(0.6) translateY(5px);
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-origin: 64px 64px;
        }
        .group:has(a:hover, a:focus-visible, a:active) .core-layer {
        opacity: 1;
        transform: scale(1) translateY(0px);
        }

        .core-crystal {
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.1s;
        }
        .group:has(a:hover, a:focus-visible, a:active) .core-crystal {
        animation: core-levitate 4s ease-in-out infinite alternate 0.5s;
        }

        /* 3. The Core Concepts Data Orbit (htmx lore integrated) */
        .orbit-ring {
        opacity: 0;
        transform: rotate(-45deg) scale(0.8);
        transform-origin: 64px 64px;
        transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .group:has(a:hover, a:focus-visible, a:active) .orbit-ring {
        opacity: 1;
        transform: rotate(0deg) scale(1);
        animation: orbit-spin 20s linear infinite 0.6s;
        }

        .orbit-text {
        font-family: monospace;
        font-size: 4.5px;
        font-weight: bold;
        fill: var(--text-glow);
        letter-spacing: 0.5px;
        transition: fill 150ms;
        }

        /* 4. Energy Tethers */
        .tether {
        stroke: var(--glow-line);
        stroke-width: 0.75;
        stroke-dasharray: 4 4;
        opacity: 0;
        transition: opacity 0.4s ease-in;
        }
        .group:has(a:hover, a:focus-visible, a:active) .tether {
        opacity: 0.4;
        animation: dash-flow 1s linear infinite;
        }

        /* Keyframes */
        @keyframes core-levitate {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-5px); }
        }
        @keyframes orbit-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
        }
        @keyframes dash-flow {
        to { stroke-dashoffset: -8; }
        }
    </style>

    <g class="core-concept">

        <!-- ========================================== -->
        <!-- LAYER 1: BACKDROP (Orbits & Tethers)       -->
        <!-- ========================================== -->
        <g class="core-layer">
            <!-- Tethers connecting to the expanded outer shields -->
            <path class="tether" d="M 64 64 L 64 6" />
            <path class="tether" d="M 64 64 L 14 93" />
            <path class="tether" d="M 64 64 L 114 93" />

            <g class="orbit-ring">
                <!-- Data Rings -->
                <circle cx="64" cy="64" r="32" stroke="var(--glow-line)" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.8" />
                <circle cx="64" cy="64" r="25" stroke="var(--glow-line)" stroke-width="0.25" opacity="0.3" />

                <!-- Fundamental Attributes (htmx lore) acting as orbital nodes -->
                <g transform="translate(0, -32)">
                    <circle cx="64" cy="64" r="1.5" fill="var(--glow-line)" />
                    <text x="64" y="61" text-anchor="middle" class="orbit-text">hx-get</text>
                </g>

                <g transform="translate(0, 32)">
                    <circle cx="64" cy="64" r="1.5" fill="var(--glow-line)" />
                    <text x="64" y="59" text-anchor="middle" class="orbit-text" transform="rotate(180 64 64)">hx-post</text>
                </g>

                <g transform="translate(-32, 0)">
                    <circle cx="64" cy="64" r="1.5" fill="var(--glow-line)" />
                    <text x="64" y="61" text-anchor="middle" class="orbit-text" transform="rotate(-90 64 64)">hx-swap</text>
                </g>

                <g transform="translate(32, 0)">
                    <circle cx="64" cy="64" r="1.5" fill="var(--glow-line)" />
                    <text x="64" y="61" text-anchor="middle" class="orbit-text" transform="rotate(90 64 64)">hx-target</text>
                </g>
            </g>
        </g>


        <!-- ========================================== -->
        <!-- LAYER 2: THE INNER CORE                    -->
        <!-- ========================================== -->
        <g class="core-layer core-crystal">
            <!-- Holographic Crystal Glow -->
            <path d="M 64 42 L 84 64 L 64 86 L 44 64 Z" stroke="var(--glow-line)" stroke-width="1.5" fill="none" opacity="0.3" filter="blur(1px)" />

            <!-- Central Energy Point (behind diamond) -->
            <circle cx="64" cy="64" r="3" fill="var(--text-glow)" opacity="0.2" />
            <circle cx="64" cy="64" r="1.5" fill="var(--text-glow)" />

            <!-- Isometric Core Node (Octahedron/Diamond) -->
            <path d="M 64 48 L 50 64 L 64 70 Z" fill="var(--glow-line)" opacity="0.4" />
            <path d="M 64 48 L 78 64 L 64 70 Z" fill="var(--glow-line)" opacity="0.6" />
            <path d="M 64 80 L 50 64 L 64 70 Z" fill="var(--glow-line)" opacity="0.8" />
            <path d="M 64 80 L 78 64 L 64 70 Z" fill="var(--text-glow)" opacity="0.9" />
        </g>

        <!-- ========================================== -->
        <!-- LAYER 3: THE OUTER SHELLS (The Hexagon)    -->
        <!-- ========================================== -->
        <!-- In default state, these perfectly align to form a flat isometric cube / hexagon.
             On hover, they explode outward to reveal the core fundamentals. -->

        <!-- Top Face Shield -->
        <g class="shield top-shield">
            <path class="gs gs2" d="M 64 28 L 95 46 L 64 64 L 33 46 Z" />
        </g>

        <!-- Left Face Shield -->
        <g class="shield left-shield">
            <path class="gs gs3" d="M 33 46 L 64 64 L 64 100 L 33 82 Z" />
        </g>

        <!-- Right Face Shield -->
        <g class="shield right-shield">
            <path class="gs gs4" d="M 64 64 L 95 46 L 95 82 L 64 100 Z" />
        </g>

    </g>
</svg>