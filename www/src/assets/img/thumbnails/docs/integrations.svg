<svg viewBox="0 0 128 96" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .accent { fill: var(--accent); stroke: var(--accent); transition: fill 150ms, stroke 150ms; }
        .accent-body { fill: var(--accent); fill-opacity: 0.4; stroke: var(--accent); transition: fill 150ms, stroke 150ms; }
    </style>

    <!-- Left component box -->
    <rect class="accent-body" x="28" y="32" width="28" height="32" rx="4" stroke-width="1.5"/>
    <!-- Angle bracket inside: < / > -->
    <path class="accent" d="M37 44l-3 4 3 4" style="fill: none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path class="accent" d="M49 44l3 4-3 4" style="fill: none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right component box (muted) -->
    <rect x="72" y="32" width="28" height="32" rx="4" stroke="currentColor" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Gear inside right box -->
    <circle cx="86" cy="48" r="6" stroke="currentColor" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="86" cy="48" r="2" stroke="currentColor" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Connection line with dots -->
    <line class="accent" x1="56" y1="48" x2="72" y2="48" style="fill: none" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle class="accent" cx="56" cy="48" r="2"/>
    <circle class="accent" cx="72" cy="48" r="2"/>
</svg>
