<svg viewBox="0 0 128 96" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .accent { fill: var(--accent); stroke: var(--accent); transition: fill 150ms, stroke 150ms; }
        .accent-body { fill: var(--accent); fill-opacity: 0.4; stroke: var(--accent); transition: fill 150ms, stroke 150ms; }
    </style>

    <!-- Signal source dot -->
    <circle class="accent" cx="44" cy="48" r="4"/>

    <!-- Signal waves -->
    <path class="accent" d="M56 34c8 4 12 10 12 14s-4 10-12 14" style="fill: none" stroke-width="1.5" stroke-linecap="round"/>
    <path class="accent" d="M64 26c12 6 18 15 18 22s-6 16-18 22" style="fill: none" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
    <path d="M72 20c14 8 22 19 22 28s-8 20-22 28" stroke="currentColor" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round" style="fill: none"/>

    <!-- Data packets on waves -->
    <rect class="accent" x="58" y="46" width="6" height="4" rx="1"/>
    <rect class="accent" x="70" y="40" width="6" height="4" rx="1"/>
    <rect class="accent" x="70" y="52" width="6" height="4" rx="1"/>
</svg>
