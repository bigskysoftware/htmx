<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>htmx 4.0 — Kernel Playground</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 40px auto; }
        button { padding: 8px 16px; margin: 4px; cursor: pointer; }
        #result { border: 1px solid #ccc; padding: 16px; margin-top: 16px; min-height: 40px; }
        .log { font-size: 12px; color: #666; margin-top: 16px; }
        .log div { padding: 2px 0; border-bottom: 1px solid #eee; }
        .mode-switcher { background: #f5f5f5; padding: 12px; border-radius: 6px; margin-bottom: 20px; }
        .mode-switcher label { margin-right: 16px; cursor: pointer; }
        .mode-switcher .active { font-weight: bold; }
        #mode-label { font-size: 13px; color: #888; }
    </style>
</head>
<body>
    <h1>htmx 4.0 Kernel Playground</h1>

    <div class="mode-switcher">
        <strong>Load mode:</strong>
        <label><input type="radio" name="mode" value="runtime" checked> Runtime (kernel + core)</label>
        <label><input type="radio" name="mode" value="simple"> Assembled (simple)</label>
        <label><input type="radio" name="mode" value="inline"> Assembled (inline)</label>
        <span id="mode-label"></span>
    </div>

    <h3>hx-get (default trigger: click)</h3>
    <button hx-get="fragments/hello.html">Click me (hx-get)</button>

    <h3>hx-get + hx-target</h3>
    <button hx-get="fragments/hello.html" hx-target="#result">Load into #result</button>
    <div id="result">target: nothing loaded yet</div>

    <h3>hx-get + hx-swap</h3>
    <button hx-get="fragments/item.html" hx-target="#result" hx-swap="beforeend">Append item</button>

    <h3>Event log</h3>
    <div class="log" id="log"></div>

    <script>
        // Mode switcher: reload with ?mode=runtime|simple|inline
        const params = new URLSearchParams(location.search)
        const mode = params.get('mode') || 'runtime'

        // Check the right radio button
        const radio = document.querySelector(`input[value="${mode}"]`)
        if (radio) radio.checked = true

        document.querySelectorAll('input[name="mode"]').forEach(r => {
            r.addEventListener('change', () => {
                location.search = `?mode=${r.value}`
            })
        })

        const scripts = {
            runtime: ['../src/htmx.kernel.js', '../src/htmx.core.js'],
            simple:  ['htmx.assembled.js'],
            inline:  ['htmx.inlined.js'],
        }

        document.getElementById('mode-label').textContent = `Loading: ${scripts[mode].join(' + ')}`

        // Load the scripts
        for (const src of scripts[mode]) {
            document.write(`<script src="${src}"><\/script>`)
        }
    </script>

    <script>
        const events = [
            'htmx:before:init', 'htmx:after:init',
            'htmx:before:trigger', 'htmx:after:trigger',
            'htmx:before:request', 'htmx:after:request',
            'htmx:before:swap', 'htmx:after:swap',
            'htmx:done', 'htmx:error',
        ]
        const log = document.getElementById('log')
        for (const name of events) {
            document.body.addEventListener(name, (e) => {
                const div = document.createElement('div')
                div.textContent = `${name} — <${e.target.tagName?.toLowerCase() || '?'}${e.target.id ? '#'+e.target.id : ''}>`
                log.prepend(div)
            })
        }
    </script>
</body>
</html>
